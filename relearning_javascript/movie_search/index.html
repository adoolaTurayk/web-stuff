<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div id="container">
        <div id="controls">
            <div id="searchContainer">
                <input placeholder="Enter movie name..." id="movie">
                <button onclick="startSearch()" id="srchBtn">search</button>
            </div>
        </div>
        <div id="results"></div>
        <div>
            <button id="first" disabled onclick="count.reset()"><<</button>
            <button id="prev" disabled onclick="count.decrement()"><</button>
            <span id="index">0 / 0</span>
            <button id="next" disabled onclick="count.increment()">></button>
            <button id="last" disabled onclick="count.max()">>></button>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
